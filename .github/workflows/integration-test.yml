name: Integration Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging

permissions:
  contents: read
  id-token: write

jobs:
  sign-test-artifact:
    name: Sign test artifact (${{ inputs.environment }})
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create dummy artifact
        run: |
          mkdir -p "${RUNNER_TEMP}/TestApp.app/Contents/MacOS"
          echo '#!/bin/bash' > "${RUNNER_TEMP}/TestApp.app/Contents/MacOS/TestApp"
          chmod +x "${RUNNER_TEMP}/TestApp.app/Contents/MacOS/TestApp"
          cat > "${RUNNER_TEMP}/TestApp.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.block.test</string>
            <key>CFBundleExecutable</key>
            <string>TestApp</string>
          </dict>
          </plist>
          PLIST

      - name: Sign artifact
        id: codesign
        uses: ./
        with:
          osx-codesign-role: ${{ secrets.OSX_CODESIGN_ROLE }}
          codesign-s3-bucket: ${{ secrets.CODESIGN_S3_BUCKET }}
          unsigned-artifact-path: ${{ runner.temp }}/TestApp.app
          artifact-name: integration-test-${{ github.sha }}-${{ github.run_id }}

      - name: Verify outputs
        run: |
          set -euo pipefail
          echo "Signed artifact: ${{ steps.codesign.outputs.signed-artifact-path }}"
          echo "Build number: ${{ steps.codesign.outputs.build-number }}"
          echo "Duration: ${{ steps.codesign.outputs.signing-duration }}s"
          test -f "${{ steps.codesign.outputs.signed-artifact-path }}"
          echo "Integration test passed"
