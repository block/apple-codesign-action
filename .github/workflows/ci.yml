name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract and lint bash from action.yml
        run: |
          set -euo pipefail
          python3 -c "
          import yaml, sys, tempfile, subprocess, os
          with open('action.yml') as f:
              action = yaml.safe_load(f)
          errors = 0
          for i, step in enumerate(action['runs']['steps']):
              run_block = step.get('run', '')
              if not run_block:
                  continue
              path = os.path.join(tempfile.gettempdir(), f'step-{i}.sh')
              with open(path, 'w') as f:
                  f.write(run_block)
              print(f'--- Checking step {i}: {step.get(\"name\", \"unnamed\")} ---')
              result = subprocess.run(['shellcheck', '-s', 'bash', '-e', 'SC2129', path])
              if result.returncode != 0:
                  errors += 1
              os.unlink(path)
          sys.exit(1 if errors else 0)
          "

  actionlint:
    name: Action Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install actionlint
        run: |
          bash <(curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/

      - name: Lint workflows
        run: actionlint

  bats:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run tests
        run: bats tests/
